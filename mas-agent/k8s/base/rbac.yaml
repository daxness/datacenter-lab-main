# rbac.yaml
#
# ServiceAccount + ClusterRole + ClusterRoleBinding for the MRA.
#
# The MRA needs exactly two Kubernetes API permissions:
#   1. Read the mas-policy ConfigMap (Domain 1) to load pressure thresholds
#   2. Read the mas-topology ConfigMap (Domain 2) to validate deployment existence
#
# The MRA does NOT get HPA patch permission.
# That permission belongs exclusively to the RSA ServiceAccount (rsa-sa).
# This is the RBAC enforcement of the single-executor invariant defined in
# Security Model Issue 8 and RSA Specification Section 1.
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mra-sa
  namespace: mas-system
  labels:
    mas-component: mra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mra-configmap-reader
  namespace: mas-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["mas-policy", "mas-topology"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mra-configmap-reader-binding
  namespace: mas-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mra-configmap-reader
subjects:
  - kind: ServiceAccount
    name: mra-sa
    namespace: mas-system
