# pfa-redis.yaml
#
# PFA instance forecasting for the "redis" deployment in namespace "workloads".
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pfa-redis
  namespace: mas-system
  labels:
    app: mas-pfa
    monitored-deployment: redis
    monitored-namespace: workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mas-pfa
      monitored-deployment: redis
  template:
    metadata:
      labels:
        app: mas-pfa
        monitored-deployment: redis
        monitored-namespace: workloads
    spec:
      serviceAccountName: pfa-sa
      securityContext:
        runAsUser: 1001
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: pfa
          image: mas-pfa:latest
          imagePullPolicy: Never
          env:
            - name: PFA_NAMESPACE
              value: "workloads"
            - name: PFA_DEPLOYMENT
              value: "redis"
            - name: MQTT_HOST
              value: "mosquitto.mas-system.svc.cluster.local"
            - name: MQTT_PORT
              value: "1883"
            - name: MQTT_USERNAME
              value: "pfa"
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mqtt-credentials
                  key: pfa-password
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
            - name: DOMAIN4_DB_PATH
              value: "/mnt/kb/domain4/audit_log.db"
            - name: WINDOW_MAX_SIZE
              value: "96"
            - name: WINDOW_MIN_INFERENCE
              value: "32"
            - name: PATCH_SIZE
              value: "32"
            - name: PERIODIC_INFERENCE_INTERVAL
              value: "900"
            - name: MIN_INFERENCE_GAP
              value: "90"
            - name: CPU_BREACH_PCT
              value: "0.70"
            - name: MEMORY_BREACH_PCT
              value: "0.75"
            - name: MRA_MISSED_SUSPECTED
              value: "3"
            - name: MRA_MISSED_CONFIRMED
              value: "5"
            - name: FORECAST_STEPS
              value: "30"
            - name: STEP_DURATION
              value: "30"
            - name: HEARTBEAT_INTERVAL
              value: "30"
            - name: STARTUP_TIMEOUT
              value: "120"
            - name: HF_HOME
              value: "/mnt/hf-cache"
          volumeMounts:
            - name: kb-storage
              mountPath: /mnt/kb
            - name: hf-cache
              mountPath: /mnt/hf-cache
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          livenessProbe:
            exec:
              command: ["python3", "-c", "import pfa.config; print('ok')"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python3", "-c", "import pfa.config; print('ok')"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: kb-storage
          persistentVolumeClaim:
            claimName: kb-shared-pvc
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
